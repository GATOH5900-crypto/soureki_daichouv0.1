<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="蒼暦台帳">
<meta name="theme-color" content="#0c0f16">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" type="image/png" href="apple-touch-icon.png">
<link rel="manifest" href="manifest.webmanifest">
<title>蒼暦台帳</title>
<style>
:root{
  --bg:#0c0f16; --bg2:#11151f; --card:#161b26; --card2:#1c2230;
  --line:#2a3140; --line2:#39424f;
  --fg:#dcd8cb; --muted:#8b90a0; --muted2:#6f7482;
  --accent:#a51e2d;            /* 緋・国旗の色。年見出し下線と主要ボタンにのみ用いる */
  --accent-soft:#c2313f;
  --accent-fg:#f4eae9;
  --ok:#4a7d6b;
  --serif:"Hiragino Mincho ProN","Yu Mincho","YuMincho","Noto Serif JP","Songti SC",serif;
  --sans:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Hiragino Sans","Noto Sans JP","Yu Gothic UI",Meiryo,system-ui,sans-serif;
  --appbar-h:52px;             /* 後方互換のため残置（未使用） */
  --appbar-content-h:52px;     /* 上部バーの中身(行+バナー)の実測高さ。セーフエリアは含めない */
  --tabbar-h:56px;
  --sb:env(safe-area-inset-bottom,0px);
  --st:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg); color:var(--fg);
  font-family:var(--sans); font-size:15px; line-height:1.62;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  padding-top:calc(var(--st) + var(--appbar-content-h));
  padding-bottom:calc(var(--tabbar-h) + var(--sb) + 10px);
  overflow-x:hidden;
}
button{font-family:inherit; color:inherit; cursor:pointer;}
input,textarea,select{font-family:inherit; font-size:16px; color:var(--fg);}
:focus-visible{outline:2px solid var(--accent-soft); outline-offset:2px;}
::selection{background:rgba(165,30,45,.5); color:#fff;}
.hidden{display:none !important;}
.mono-num{font-variant-numeric:tabular-nums;}

/* ===== 上部バー ===== */
#appbar{
  position:fixed; top:0; left:0; right:0; z-index:40;
  background:linear-gradient(180deg,#0e121b,#0c0f16);
  border-bottom:1px solid var(--line);
  padding-top:var(--st);
}
.appbar-row{
  height:52px; display:flex; align-items:center; gap:10px;
  padding:0 14px;
}
.wordmark{
  font-family:var(--serif); font-size:18px; letter-spacing:.14em;
  color:var(--fg); white-space:nowrap; font-weight:600;
}
.wordmark .seal{
  display:inline-block; width:7px; height:7px; margin-right:9px;
  background:var(--accent); transform:rotate(45deg); vertical-align:middle;
  position:relative; top:-2px;
}
.appbar-sub{
  margin-left:auto; color:var(--muted); font-size:12.5px;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:52%;
  font-family:var(--serif); letter-spacing:.04em;
}
#banner{
  display:none; background:#2a1418; border-top:1px solid #4a2026;
  color:#e7c9c2; font-size:12px; line-height:1.5; padding:7px 14px;
}
#banner.on{display:block;}
#banner b{color:#f0d6cf; font-weight:600;}

/* ===== タブバー ===== */
#tabbar{
  position:fixed; left:0; right:0; bottom:0; z-index:45;
  height:calc(var(--tabbar-h) + var(--sb));
  padding-bottom:var(--sb);
  display:flex; background:linear-gradient(0deg,#0d1119,#10141d);
  border-top:1px solid var(--line);
}
.tabbtn{
  flex:1; background:none; border:0; color:var(--muted2);
  font-size:12px; letter-spacing:.18em; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:3px; padding-top:2px;
  min-height:44px; font-family:var(--serif);
}
.tabbtn .gl{width:14px; height:14px; opacity:.6;}
.tabbtn.on{color:var(--fg);}
.tabbtn.on .gl{opacity:1;}
.tabbtn.on .lbl{position:relative;}
.tabbtn.on .lbl::after{
  content:""; position:absolute; left:50%; transform:translateX(-50%);
  bottom:-4px; width:16px; height:2px; background:var(--accent); border-radius:2px;
}

/* ===== FAB ===== */
#fab{
  position:fixed; right:16px; z-index:44;
  bottom:calc(var(--tabbar-h) + var(--sb) + 16px);
  width:56px; height:56px; border-radius:50%; border:1px solid #c23a48;
  background:radial-gradient(120% 120% at 30% 25%,#c2313f,#8f1a26);
  color:var(--accent-fg); font-size:30px; line-height:1;
  box-shadow:0 8px 22px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.15);
  display:flex; align-items:center; justify-content:center; padding-bottom:3px;
}
#fab:active{transform:scale(.94);}

/* ===== パネル共通 ===== */
.panel{display:none; padding:0 0 8px;}
.panel.on{display:block;}
.section-lead{
  font-family:var(--serif); font-size:13px; letter-spacing:.1em; color:var(--muted);
  padding:16px 16px 6px;
}

/* ===== 抽出バー ===== */
.filter{border-bottom:1px solid var(--line); background:var(--bg2);}
.filter-head{display:flex; align-items:center; gap:8px; padding:9px 14px; min-height:44px;}
.filter-toggle{
  background:var(--card); border:1px solid var(--line2); color:var(--fg);
  border-radius:8px; padding:6px 11px; font-size:13px; display:flex; align-items:center; gap:6px;
}
.filter-toggle .car{font-size:10px; color:var(--muted); transition:transform .18s;}
.filter.open .filter-toggle .car{transform:rotate(180deg);}
.filter-summary{color:var(--muted); font-size:12.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.filter-clear{margin-left:auto; background:none; border:0; color:var(--accent-soft); font-size:12.5px; padding:6px 4px;}
.filter-body{display:none; padding:0 14px 13px; }
.filter.open .filter-body{display:block;}
.filter-q{
  width:100%; background:#0c1017; border:1px solid var(--line2); border-radius:9px;
  padding:10px 12px; margin-bottom:10px; color:var(--fg);
}
.filter-q::placeholder{color:var(--muted2);}
.chips{display:flex; flex-wrap:wrap; gap:7px;}
.chip{
  border:1px solid var(--line2); background:var(--card); color:var(--fg);
  border-radius:999px; padding:6px 12px; font-size:12.5px; display:inline-flex; align-items:center; gap:6px;
  min-height:33px;
}
.chip .dot{width:9px; height:9px; border-radius:50%; flex:0 0 auto;}
.chip.sel{border-width:1.5px; font-weight:600;}
.mode-row{display:flex; gap:8px; margin-top:11px; align-items:center;}
.mode-row .lb{font-size:12px; color:var(--muted); margin-right:2px;}
.seg{display:inline-flex; border:1px solid var(--line2); border-radius:8px; overflow:hidden;}
.seg button{background:var(--card); border:0; color:var(--muted); padding:6px 13px; font-size:12.5px; min-height:32px;}
.seg button.on{background:var(--accent); color:var(--accent-fg);}

/* ===== 年表本体 ===== */
#tl-body{padding-bottom:20px;}
.gap-mark{
  text-align:center; color:var(--muted2); font-size:11.5px; letter-spacing:.14em;
  padding:12px 0; position:relative; font-family:var(--serif);
}
.gap-mark::before,.gap-mark::after{
  content:""; position:absolute; top:50%; width:22%; height:1px;
  background:linear-gradient(90deg,transparent,var(--line2));
}
.gap-mark::before{left:12%;}
.gap-mark::after{right:12%; background:linear-gradient(270deg,transparent,var(--line2));}

.year-sec{margin-bottom:2px;}
.year-sticky{
  position:sticky; top:calc(var(--st) + var(--appbar-content-h)); z-index:10;
  background:linear-gradient(180deg,var(--bg) 72%,rgba(12,15,22,.86));
  padding:9px 14px 8px;
}
.year-head{
  display:flex; align-items:baseline; gap:10px; width:100%; text-align:left;
  background:none; border:0; padding:2px 0 6px;
}
.year-num{font-family:var(--serif); font-size:25px; font-weight:600; letter-spacing:.03em; line-height:1;}
.year-num .era{font-size:12px; color:var(--muted); margin-right:3px; letter-spacing:.1em;}
.year-jumphint{margin-left:auto; color:var(--muted2); font-size:10.5px; align-self:center; letter-spacing:.08em;}
.year-underline{height:2px; background:linear-gradient(90deg,var(--accent),rgba(165,30,45,0)); border-radius:2px; width:66px; margin-top:-4px;}

.inprog{display:flex; flex-wrap:wrap; gap:6px; padding:8px 0 2px;}
.inprog-lb{font-size:10.5px; color:var(--muted2); align-self:center; letter-spacing:.1em; margin-right:1px;}
.inprog-chip{
  border:1px solid var(--line2); background:#131a17; color:var(--fg);
  border-radius:6px; padding:4px 9px; font-size:11.5px; display:inline-flex; align-items:center; gap:6px;
  max-width:100%;
}
.inprog-chip .bar-i{width:3px; height:12px; border-radius:2px; flex:0 0 auto;}
.inprog-chip .t{overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:180px;}
.inprog-chip .sp{color:var(--muted); font-size:10px; flex:0 0 auto;}

.year-cards{padding:2px 14px 10px;}

/* ===== カード ===== */
.card{
  background:var(--card); border:1px solid var(--line); border-radius:11px;
  margin-top:8px; overflow:hidden; position:relative;
}
.card::before{content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--line2);}
.card[data-accent]::before{background:var(--accent);}
.card-head{display:flex; align-items:flex-start; gap:10px; padding:11px 12px 11px 14px; width:100%; text-align:left; background:none; border:0;}
.card-date{
  font-family:var(--serif); font-size:12px; color:var(--muted); white-space:nowrap;
  padding-top:2px; letter-spacing:.02em; min-width:74px;
}
.card-main{flex:1; min-width:0;}
.card-title{font-size:15px; line-height:1.4; word-break:break-word;}
.card-meta{display:flex; align-items:center; gap:8px; margin-top:5px; flex-wrap:wrap;}
.period-badge{
  font-size:10.5px; color:#d7c6c9; border:1px solid #4a2b30; background:#221317;
  border-radius:5px; padding:2px 7px; font-family:var(--serif); letter-spacing:.02em;
}
.tag-dots{display:flex; gap:4px;}
.tag-dots .d{width:8px; height:8px; border-radius:50%;}
.card-caret{color:var(--muted2); font-size:11px; align-self:center; transition:transform .18s;}
.card.open .card-caret{transform:rotate(180deg);}
.card-body{display:none; padding:0 14px 13px 14px; border-top:1px solid var(--line); margin-top:0;}
.card.open .card-body{display:block; animation:fade .2s ease;}
.card-memo{white-space:pre-wrap; color:var(--fg); font-size:14px; padding:11px 0 4px; word-break:break-word;}
.card-memo.empty{color:var(--muted2); font-style:normal;}
.card-tags{display:flex; flex-wrap:wrap; gap:6px; padding:6px 0 10px;}
.tag-mini{font-size:11px; border-radius:5px; padding:3px 8px; border:1px solid var(--line2);}
.card-actions{display:flex; gap:8px;}
.btn-s{
  background:var(--card2); border:1px solid var(--line2); color:var(--fg);
  border-radius:8px; padding:8px 13px; font-size:12.5px; min-height:38px;
}
.btn-s.accent{border-color:#8f2530; background:#221217; color:#eecdd0;}
@keyframes fade{from{opacity:0; transform:translateY(-2px);} to{opacity:1; transform:none;}}

.card.flash{animation:flashk 1.2s ease;}
@keyframes flashk{0%,100%{box-shadow:0 0 0 0 rgba(165,30,45,0);} 20%{box-shadow:0 0 0 2px rgba(194,49,63,.7);} }

.empty-state{
  text-align:center; color:var(--muted); padding:60px 30px; font-size:13.5px; line-height:1.9;
}
.empty-state .big{font-family:var(--serif); font-size:15px; color:var(--fg); display:block; margin-bottom:8px; letter-spacing:.05em;}

/* ===== 伝承 ===== */
#lg-body{padding:6px 14px 20px;}
.legend-card{background:var(--card); border:1px solid var(--line); border-radius:11px; margin-top:9px; overflow:hidden; position:relative;}
.legend-card::before{content:""; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--line2);}
.legend-card[data-accent]::before{background:var(--accent);}
.legend-head{display:flex; gap:10px; align-items:flex-start; padding:11px 12px 11px 14px;}
.legend-sort{display:flex; flex-direction:column; gap:4px; padding-top:1px;}
.sort-b{width:30px; height:26px; border:1px solid var(--line2); background:var(--card2); color:var(--muted); border-radius:6px; font-size:11px; display:flex; align-items:center; justify-content:center;}
.sort-b:disabled{opacity:.3;}
.legend-tap{flex:1; text-align:left; background:none; border:0; min-width:0; padding:0;}
.legend-approx{font-family:var(--serif); font-size:11.5px; color:#b79aa0; letter-spacing:.04em;}
.legend-title{font-size:15px; margin-top:3px; word-break:break-word;}
.legend-caret{color:var(--muted2); font-size:11px; align-self:center; transition:transform .18s;}
.legend-card.open .legend-caret{transform:rotate(180deg);}
.legend-body{display:none; padding:0 14px 12px 14px; border-top:1px solid var(--line);}
.legend-card.open .legend-body{display:block; animation:fade .2s ease;}

/* ===== 台帳 ===== */
#ledger{padding:4px 0 24px;}
.ldg-block{border-top:1px solid var(--line); margin-top:6px; padding:4px 0 10px;}
.ldg-title{font-family:var(--serif); font-size:15px; letter-spacing:.08em; padding:14px 16px 4px; display:flex; align-items:center; gap:9px;}
.ldg-title .no{color:var(--accent-soft); font-size:12px; font-weight:600;}
.ldg-note{color:var(--muted2); font-size:11.5px; padding:0 16px 8px; line-height:1.6;}
.ldg-inner{padding:4px 16px;}

.dataname-row{display:flex; gap:8px; align-items:center; padding:14px 16px 4px;}
.dataname-row input{flex:1; background:#0c1017; border:1px solid var(--line2); border-radius:9px; padding:9px 11px;}

.tagrow{display:flex; align-items:center; gap:9px; padding:8px 0; border-bottom:1px solid #1b212c;}
.tagrow:last-child{border-bottom:0;}
.swatch{width:30px; height:30px; border-radius:7px; border:1px solid rgba(255,255,255,.14); flex:0 0 auto;}
.tagrow .nm{flex:1; background:#0c1017; border:1px solid var(--line2); border-radius:8px; padding:8px 10px; min-width:0;}
.tagrow .cnt{color:var(--muted); font-size:12px; white-space:nowrap; font-variant-numeric:tabular-nums;}
.tagrow .del{width:34px; height:34px; border:1px solid var(--line2); background:var(--card2); color:var(--muted); border-radius:8px; flex:0 0 auto;}
.addtag{margin-top:12px; display:flex; gap:8px;}
.addtag input{flex:1; background:#0c1017; border:1px solid var(--line2); border-radius:8px; padding:9px 10px;}

.btn{
  background:var(--card2); border:1px solid var(--line2); color:var(--fg);
  border-radius:9px; padding:11px 14px; font-size:14px; min-height:44px; width:100%;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.btn.primary{background:radial-gradient(120% 160% at 30% 20%,#b62231,#8b1922); border-color:#b83643; color:var(--accent-fg); font-weight:600;}
.btn.ghost{background:none;}
.btn+.btn{margin-top:9px;}
.btn:active{transform:scale(.99);}

textarea.io{
  width:100%; min-height:120px; background:#0a0d13; border:1px solid var(--line2);
  border-radius:9px; padding:11px; color:var(--fg); font-size:12.5px; line-height:1.55;
  resize:vertical; font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace; margin-top:10px;
}
.io-row{display:flex; gap:9px; margin-top:9px;}
.io-row .btn{width:auto; flex:1;}

.radio-row{display:flex; gap:9px; margin:4px 0 2px;}
.radio-opt{flex:1; border:1px solid var(--line2); background:var(--card); border-radius:9px; padding:11px; font-size:13px; text-align:center; color:var(--muted);}
.radio-opt.on{border-color:#8f2530; background:#1e1418; color:var(--fg);}
.radio-opt .sub{display:block; font-size:10.5px; color:var(--muted2); margin-top:3px;}
.filebtn{position:relative; overflow:hidden;}
.filebtn input[type=file]{position:absolute; inset:0; opacity:0; cursor:pointer;}

.stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-top:4px;}
.stat{background:var(--card); border:1px solid var(--line); border-radius:10px; padding:11px 12px;}
.stat .k{font-size:11px; color:var(--muted); letter-spacing:.06em;}
.stat .v{font-family:var(--serif); font-size:19px; margin-top:3px; font-variant-numeric:tabular-nums;}
.stat.wide{grid-column:1 / -1;}
.stat-taglist{margin-top:10px;}
.stat-tagline{display:flex; align-items:center; gap:8px; padding:5px 0; font-size:13px; border-bottom:1px solid #1b212c;}
.stat-tagline:last-child{border-bottom:0;}
.stat-tagline .d{width:9px; height:9px; border-radius:50%;}
.stat-tagline .c{margin-left:auto; color:var(--muted); font-variant-numeric:tabular-nums;}

/* ===== レイヤ（シート・ダイアログ・近傍） ===== */
.layer{
  position:fixed; inset:0; z-index:105; display:flex;
  opacity:0; visibility:hidden; transition:opacity .2s ease, visibility .2s;
  background:rgba(4,6,10,.64); -webkit-backdrop-filter:blur(1.5px); backdrop-filter:blur(1.5px);
}
.layer.on{opacity:1; visibility:visible;}
.sheet-layer{align-items:flex-end; justify-content:center;}
.sheet-card{
  width:100%; max-width:640px; max-height:88vh; overflow:auto;
  background:var(--bg2); border-top:1px solid var(--line2);
  border-top-left-radius:18px; border-top-right-radius:18px;
  transform:translateY(102%); transition:transform .24s cubic-bezier(.2,.75,.2,1);
  padding:12px 16px calc(18px + var(--sb));
}
.layer.on .sheet-card{transform:none;}
.grab{width:38px; height:4px; background:var(--line2); border-radius:3px; margin:2px auto 12px;}
.sheet-title{font-family:var(--serif); font-size:16px; letter-spacing:.06em; margin-bottom:12px; display:flex; align-items:center; justify-content:space-between;}
.sheet-title .x{background:none; border:0; color:var(--muted); font-size:22px; line-height:1; padding:2px 6px;}

.field{margin-bottom:13px;}
.field>label{display:block; font-size:12px; color:var(--muted); margin-bottom:6px; letter-spacing:.05em;}
.field input[type=text],.field textarea{
  width:100%; background:#0c1017; border:1px solid var(--line2); border-radius:9px; padding:11px 12px;
}
.field textarea{min-height:88px; resize:vertical; line-height:1.6;}
.ymd{display:flex; gap:8px;}
.ymd .u{flex:1;}
.ymd .u small{display:block; font-size:10.5px; color:var(--muted2); margin-bottom:4px; text-align:center;}
.ymd input{width:100%; text-align:center; background:#0c1017; border:1px solid var(--line2); border-radius:9px; padding:11px 6px; font-variant-numeric:tabular-nums;}
.ymd input:disabled{opacity:.4;}
.switch-row{display:flex; align-items:center; gap:10px; padding:6px 0;}
.switch{width:46px; height:27px; border-radius:99px; background:var(--card2); border:1px solid var(--line2); position:relative; flex:0 0 auto; transition:background .15s;}
.switch .kn{position:absolute; top:2px; left:2px; width:21px; height:21px; border-radius:50%; background:#c7c3b7; transition:left .16s;}
.switch.on{background:#7a1c26; border-color:#a02a34;}
.switch.on .kn{left:21px; background:#f0e6e4;}
.end-block{display:none; margin-top:10px; padding-top:11px; border-top:1px dashed var(--line2);}
.end-block.on{display:block;}
.end-block .cap{font-size:11.5px; color:var(--muted); margin-bottom:8px;}

.picker-tags{display:flex; flex-wrap:wrap; gap:7px; margin-bottom:9px;}
.newtag-inline{display:flex; gap:7px; align-items:center;}
.newtag-inline input{flex:1; background:#0c1017; border:1px solid var(--line2); border-radius:8px; padding:9px 10px;}
.newtag-inline .sw{width:34px; height:34px; border-radius:8px; border:1px solid rgba(255,255,255,.14); flex:0 0 auto;}
.newtag-inline .add{background:var(--card2); border:1px solid var(--line2); border-radius:8px; padding:0 12px; height:34px; font-size:13px; flex:0 0 auto;}

.err-box{background:#241318; border:1px solid #55232b; color:#eec9c9; border-radius:9px; padding:10px 12px; font-size:12.5px; line-height:1.6; margin-bottom:12px;}
.err-box ul{margin:4px 0 0; padding-left:18px;}

.sheet-foot{display:flex; gap:9px; margin-top:6px;}
.sheet-foot .btn{width:auto; flex:1;}
.sheet-foot .btn.del{flex:0 0 auto; width:52px; background:#1e1216; border-color:#4a2229; color:#d99; font-size:18px;}

/* ダイアログ */
.dialog-layer{align-items:center; justify-content:center; z-index:120; padding:22px;}
.dialog-card{
  width:100%; max-width:362px; background:var(--card); border:1px solid var(--line2);
  border-radius:15px; padding:17px; transform:scale(.95); transition:transform .18s ease;

<script>
"use strict";
/* =====================================================================
   蒼暦台帳  soreki-daicho  schemaVersion 2
   構成: (1)状態 (2)保存と読み込み (3)検証と移行 (4)描画 (5)道具箱
   外部依存なし。単一ファイル。
   ===================================================================== */

/* ---- 小さなDOM生成器 ---- */
function h(tag, attrs, kids){
  var e=document.createElement(tag);
  if(attrs) for(var k in attrs){
    var v=attrs[k];
    if(v==null||v===false) continue;
    if(k==="class") e.className=v;
    else if(k==="text") e.textContent=v;
    else if(k==="style"&&typeof v==="object") Object.assign(e.style,v);
    else if(k.slice(0,2)==="on"&&typeof v==="function") e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="dataset") for(var d in v) e.dataset[d]=v[d];
    else e.setAttribute(k, v===true?"":v);
  }
  if(kids!=null){
    if(!Array.isArray(kids)) kids=[kids];
    for(var i=0;i<kids.length;i++){
      var c=kids[i];
      if(c==null||c===false) continue;
      e.appendChild(typeof c==="object"?c:document.createTextNode(String(c)));
    }
  }
  return e;
}
function $(id){return document.getElementById(id);}
function clear(node){while(node.firstChild) node.removeChild(node.firstChild);}

/* =====================================================================
   (1) 状態
   ===================================================================== */
var STORAGE_KEY="soreki_daicho_v2";
var BACKUP_KEY="soreki_daicho_backup";
var SCHEMA=2;

var PALETTE=[
  ["臙脂","#a63a50"],["錆朱","#b5654a"],["芥子","#a8863a"],["苔","#7d8c4a"],
  ["青苔","#4a8c6b"],["錆浅葱","#4a7d8c"],["群青","#4a5e9e"],["菫青","#5a4a9e"],
  ["鈍紫","#7d4a8c"],["梅紫","#9e4a7d"],["枯茶","#8c5a4a"],["利休鼠","#6b6b5a"],
  ["老竹","#5a7d6b"],["媚茶","#6b5e4a"]
];

function emptyData(){
  return {app:"soreki-daicho",schemaVersion:SCHEMA,meta:{title:"",exportedAt:""},tags:[],events:[],legends:[]};
}

var state={
  data:emptyData(),
  ui:{
    tab:"timeline",
    filter:{
      timeline:{q:"",tags:[],mode:"any",open:false},
      legend:{q:"",tags:[],mode:"any",open:false}
    },
    expanded:{},
    lastYear:null,
    recentTags:[],
    storage:"unknown",
    neighbor:{open:false,center:null,span:5,centerId:null}
  }
};

/* =====================================================================
   (5) 道具箱  ※純粋関数はテスト済みの版をそのまま採用
   ===================================================================== */
function isLeap(y){ return y % 4 === 0; }                 /* 4の倍数=閏。100/400例外なし */
function daysInMonth(y,m){
  var d=[31, isLeap(y)?29:28, 31,30,31,30,31,31,30,31,30,31];
  return d[m-1];
}
function cmpEvents(a,b){
  var as=a.start, bs=b.start;
  return (as.year-bs.year)
    || ((as.month==null?0:as.month)-(bs.month==null?0:bs.month))
    || ((as.day==null?0:as.day)-(bs.day==null?0:bs.day))
    || ((a.sub==null?0:a.sub)-(b.sub==null?0:b.sub))
    || ((a.createdAt==null?0:a.createdAt)-(b.createdAt==null?0:b.createdAt));
}
function inProgressAt(ev, year){ return ev.end!=null && ev.start.year < year && ev.end.year >= year; }
function overlapsWindow(ev, lo, hi){
  if(ev.end==null) return ev.start.year>=lo && ev.start.year<=hi;
  return ev.start.year<=hi && ev.end.year>=lo;
}
function fmtPoint(d){
  var s=d.year+"年";
  if(d.month!=null){ s+=d.month+"月"; if(d.day!=null) s+=d.day+"日"; }
  return s;
}
function fmtSoreki(start,end){
  if(!end) return "蒼暦"+fmtPoint(start);
  var head="蒼暦"+fmtPoint(start), tail;
  if(end.year!==start.year){ tail=fmtPoint(end); }
  else {
    if(end.month==null){
      if(start.month==null) return head;
      tail=end.year+"年";
    } else if(start.month!=null && end.month===start.month){
      tail = end.day!=null ? (end.day+"日") : (end.month+"月");
    } else {
      tail = end.month+"月" + (end.day!=null ? end.day+"日" : "");
    }
  }
  return head+"〜"+tail;
}
function periodBadge(ev){ if(ev.end==null) return null; return fmtSoreki(ev.start,ev.end).replace(/^蒼暦/,""); }

function normText(s){ return String(s==null?"":s).normalize("NFKC").toLowerCase(); }
function b36(){ return Date.now().toString(36); }
function rand4(){ return Math.random().toString(36).slice(2,6); }
function genEventId(){ return "evt_"+b36()+rand4(); }
function genLegendId(){ return "leg_"+b36()+rand4(); }
function genTagId(){ return "tag_"+b36()+rand4(); }

function pad2(n){ return (n<10?"0":"")+n; }
function isoLocal(d){ return d.getFullYear()+"-"+pad2(d.getMonth()+1)+"-"+pad2(d.getDate())+"T"+pad2(d.getHours())+":"+pad2(d.getMinutes())+":"+pad2(d.getSeconds()); }
function stamp(){ var d=new Date(); return ""+d.getFullYear()+pad2(d.getMonth()+1)+pad2(d.getDate())+"_"+pad2(d.getHours())+pad2(d.getMinutes())+pad2(d.getSeconds()); }

function tagById(id){ for(var i=0;i<state.data.tags.length;i++) if(state.data.tags[i].id===id) return state.data.tags[i]; return null; }
function tagColor(id){ var t=tagById(id); return t?t.color:"#555"; }
function tagName(id){ var t=tagById(id); return t?t.name:""; }
function hexA(hex,a){
  var m=/^#?([0-9a-f]{6})$/i.exec(hex||""); if(!m) return "rgba(120,120,120,"+a+")";
  var n=parseInt(m[1],16);
  return "rgba("+((n>>16)&255)+","+((n>>8)&255)+","+(n&255)+","+a+")";
}
function parseIntField(str){
  var s=String(str).trim();
  if(s==="") return null;
  if(!/^-?\d+$/.test(s)) return NaN;
  return parseInt(s,10);
}
function usageCount(tagId){
  var n=0,i;
  for(i=0;i<state.data.events.length;i++) if((state.data.events[i].tags||[]).indexOf(tagId)!==-1) n++;
  for(i=0;i<state.data.legends.length;i++) if((state.data.legends[i].tags||[]).indexOf(tagId)!==-1) n++;
  return n;
}
function pushRecentTags(ids){
  (ids||[]).forEach(function(id){
    var a=state.ui.recentTags;
    var k=a.indexOf(id); if(k!==-1) a.splice(k,1);
    a.unshift(id);
  });
  state.ui.recentTags=state.ui.recentTags.slice(0,8);
}

/* =====================================================================
   (2) 保存と読み込み
   ===================================================================== */
function storageWritable(){
  try{ var t="__sk_probe__"; localStorage.setItem(t,"1"); localStorage.removeItem(t); return true; }
  catch(e){ return false; }
}
var _saveTimer=null;
function scheduleSave(){
  if(state.ui.storage!=="auto") return;
  if(_saveTimer) clearTimeout(_saveTimer);
  _saveTimer=setTimeout(function(){
    try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state.data)); }
    catch(e){ /* 満杯など。メモリ状態は保持される */ }
  },500);
}

/* =====================================================================
   (3) 検証と移行
   ===================================================================== */
function validateData(o){
  var e=[];
  if(o===null||typeof o!=="object"||Array.isArray(o)) return {ok:false,errors:["最上位がオブジェクトではありません。"]};
  if(o.app!=="soreki-daicho") e.push("app 識別子が \"soreki-daicho\" ではありません（値: "+JSON.stringify(o.app)+"）。");
  if(typeof o.schemaVersion!=="number") e.push("schemaVersion が数値ではありません。");
  ["tags","events","legends"].forEach(function(k){ if(o[k]!=null && !Array.isArray(o[k])) e.push(k+" が配列ではありません。"); });
  if(e.length) return {ok:false,errors:e};

  (o.tags||[]).forEach(function(t,i){
    var p="tags["+i+"]";
    if(!t||typeof t!=="object"){ e.push(p+" がオブジェクトではありません。"); return; }
    if(typeof t.id!=="string"||!t.id) e.push(p+".id が文字列ではありません。");
    if(typeof t.name!=="string") e.push(p+".name が文字列ではありません。");
    if(typeof t.color!=="string") e.push(p+".color が文字列ではありません。");
  });
  (o.events||[]).forEach(function(ev,i){
    var p="events["+i+"]";
    if(!ev||typeof ev!=="object"){ e.push(p+" がオブジェクトではありません。"); return; }
    if(typeof ev.id!=="string"||!ev.id) e.push(p+".id が文字列ではありません。");
    if(typeof ev.title!=="string") e.push(p+".title が文字列ではありません。");
    if(!ev.start||typeof ev.start!=="object"||Array.isArray(ev.start)){ e.push(p+".start がオブジェクトではありません。"); }
    else{
      if(!Number.isInteger(ev.start.year)) e.push(p+".start.year が整数ではありません。");
      if(ev.start.month!=null && !Number.isInteger(ev.start.month)) e.push(p+".start.month が整数でも null でもありません。");
      if(ev.start.day!=null && !Number.isInteger(ev.start.day)) e.push(p+".start.day が整数でも null でもありません。");
    }
    if(ev.end!=null){
      if(typeof ev.end!=="object"||Array.isArray(ev.end)) e.push(p+".end が null でもオブジェクトでもありません。");
      else if(!Number.isInteger(ev.end.year)) e.push(p+".end.year が整数ではありません。");
    }
    if(ev.tags!=null && !Array.isArray(ev.tags)) e.push(p+".tags が配列ではありません。");
  });
  (o.legends||[]).forEach(function(lg,i){
    var p="legends["+i+"]";
    if(!lg||typeof lg!=="object"){ e.push(p+" がオブジェクトではありません。"); return; }
    if(typeof lg.id!=="string"||!lg.id) e.push(p+".id が文字列ではありません。");
    if(typeof lg.title!=="string") e.push(p+".title が文字列ではありません。");
    if(lg.approx!=null && typeof lg.approx!=="string") e.push(p+".approx が文字列でも null でもありません。");
    if(lg.tags!=null && !Array.isArray(lg.tags)) e.push(p+".tags が配列ではありません。");
  });
  return {ok:e.length===0, errors:e};
}

/* 既知フィールドの欠損だけ補う。未知フィールドは温存する（通り抜け規則） */
function normalizeData(o){
  if(o.app==null) o.app="soreki-daicho";
  if(typeof o.schemaVersion!=="number") o.schemaVersion=SCHEMA;
  if(!o.meta||typeof o.meta!=="object") o.meta={title:"",exportedAt:""};
  if(o.meta.title==null) o.meta.title="";
  if(!Array.isArray(o.tags)) o.tags=[];
  if(!Array.isArray(o.events)) o.events=[];
  if(!Array.isArray(o.legends)) o.legends=[];
  o.events.forEach(function(ev){
    if(!Array.isArray(ev.tags)) ev.tags=[];
    if(ev.end===undefined) ev.end=null;
    if(ev.start && ev.start.month===undefined) ev.start.month=null;
    if(ev.start && ev.start.day===undefined) ev.start.day=null;
    if(ev.end){ if(ev.end.month===undefined) ev.end.month=null; if(ev.end.day===undefined) ev.end.day=null; }
    if(ev.sub==null) ev.sub=0;
    if(ev.createdAt==null) ev.createdAt=Date.now();
    if(ev.updatedAt==null) ev.updatedAt=ev.createdAt;
    if(ev.memo==null) ev.memo="";
  });
  o.legends.forEach(function(lg,i){
    if(!Array.isArray(lg.tags)) lg.tags=[];
    if(lg.approx==null) lg.approx="";
    if(lg.order==null) lg.order=i;
    if(lg.memo==null) lg.memo="";
  });
  return o;
}

/* =====================================================================
   (4) 描画
   ===================================================================== */
function refresh(){ updateAppbar(); renderCurrent(); scheduleSave(); }
function renderCurrent(){
  if(state.ui.tab==="timeline") renderTimeline();
  else if(state.ui.tab==="legend") renderLegend();
  else renderLedger();
}
function updateAppbar(){
  var t=(state.data.meta&&state.data.meta.title)||"";
  $("appbar-sub").textContent = t || "（無題の台帳）";
}

/* ---- 抽出バー（一度だけ組み、以降は中身だけ差し替える。検索欄はフォーカスを守るため保持）---- */
function buildFilterBar(kind){
  var f=state.ui.filter[kind];
  var host=$("filter-"+kind);
  clear(host);

  var summary=h("div",{class:"filter-summary"});
  var clearBtn=h("button",{class:"filter-clear",text:"条件を消す",onclick:function(){
    f.q=""; f.tags=[]; f.mode="any"; qInput.value=""; refreshFilterChips(kind); syncFilterHead(kind); renderList(kind);
  }});
  var toggle=h("button",{class:"filter-toggle",onclick:function(){
    f.open=!f.open; host.classList.toggle("open",f.open); car.textContent=f.open?"▲":"▼";
  }},[h("span",{class:"lbl",text:"絞り込み"}),(function(){var c=h("span",{class:"car",text:"▼"}); return c;})()]);
  var car=toggle.querySelector(".car");
  var head=h("div",{class:"filter-head"},[toggle,summary,clearBtn]);

  var qInput=h("input",{class:"filter-q",type:"text",placeholder:"タイトル・メモを検索",value:f.q,
    oninput:function(){ f.q=qInput.value; syncFilterHead(kind); renderList(kind); }});
  var chipWrap=h("div",{class:"chips"});
  var modeSeg=h("div",{class:"seg"},[
    h("button",{dataset:{m:"any"},text:"いずれか",onclick:function(){ f.mode="any"; syncMode(); syncFilterHead(kind); renderList(kind); }}),
    h("button",{dataset:{m:"all"},text:"すべて",onclick:function(){ f.mode="all"; syncMode(); syncFilterHead(kind); renderList(kind); }})
  ]);
  function syncMode(){ modeSeg.querySelectorAll("button").forEach(function(b){ b.classList.toggle("on", b.dataset.m===f.mode); }); }
  var modeRow=h("div",{class:"mode-row"},[h("span",{class:"lb",text:"タグ照合"}),modeSeg]);
  var body=h("div",{class:"filter-body"},[qInput,chipWrap,modeRow]);

  host.appendChild(head); host.appendChild(body);
  host.classList.toggle("open",f.open);

  host._chipWrap=chipWrap; host._summary=summary; host._clearBtn=clearBtn; host._syncMode=syncMode;
  syncMode(); refreshFilterChips(kind); syncFilterHead(kind);
}
function refreshFilterChips(kind){
  var host=$("filter-"+kind); if(!host||!host._chipWrap) return;
  var f=state.ui.filter[kind];
  var wrap=host._chipWrap; clear(wrap);
  if(state.data.tags.length===0){ wrap.appendChild(h("span",{class:"filter-summary",text:"タグ未登録"})); return; }
  state.data.tags.forEach(function(t){

function syncFilterHead(kind){
  var host=$("filter-"+kind); if(!host||!host._summary) return;
  var f=state.ui.filter[kind];
  var parts=[];
  if(f.q.trim()) parts.push("「"+f.q.trim()+"」");

function renderList(kind){ if(kind==="timeline") renderTimeline(); else renderLegend(); }

function applyFilter(list, f){
  var q=normText(f.q); var tags=f.tags; var mode=f.mode;
  return list.filter(function(it){
    if(q){
      var hay=normText((it.title||"")+" "+(it.memo||""));
      if(hay.indexOf(q)===-1) return false;
    }
    if(tags.length){
      var own=it.tags||[];
      if(mode==="all"){ for(var i=0;i<tags.length;i++) if(own.indexOf(tags[i])===-1) return false; }
      else{ var any=false; for(var j=0;j<tags.length;j++) if(own.indexOf(tags[j])!==-1){any=true;break;} if(!any) return false; }
    }
    return true;
  });
}

function renderTimeline(){
  refreshFilterChips("timeline"); syncFilterHead("timeline");
  var host=$("tl-body"); clear(host);
  var events=applyFilter(state.data.events, state.ui.filter.timeline);

  if(events.length===0){
    var msg = state.data.events.length===0
      ? [h("span",{class:"big",text:"まだ記録がありません"}),"右下の＋から最初の出来事を書き留めてください。"]

    host.appendChild(h("div",{class:"empty-state"},msg));
    return;
  }

  /* 見出しを出す年: 各イベントの開始年 ＋ 期間イベントの全跨ぎ年 */
  var yearSet={}, placed={};
  events.forEach(function(ev){
    yearSet[ev.start.year]=true;
    (placed[ev.start.year]=placed[ev.start.year]||[]).push(ev);
    if(ev.end!=null){
      var lo=ev.start.year, hi=ev.end.year;
      if(hi>=lo){ for(var y=lo;y<=hi;y++) yearSet[y]=true; }
    }
  });
  for(var yy in placed) placed[yy].sort(cmpEvents);
  var years=Object.keys(yearSet).map(Number).sort(function(a,b){return a-b;});

  var frag=document.createDocumentFragment();
  for(var i=0;i<years.length;i++){
    var y=years[i];
    if(i>0){ var gap=y-years[i-1]; if(gap>1) frag.appendChild(h("div",{class:"gap-mark",text:gap+"年経過"})); }
    frag.appendChild(yearSection(y, placed[y]||[], events));
  }
  host.appendChild(frag);
}

function exportFile(){
  state.data.meta.exportedAt=isoLocal(new Date());
  var text=JSON.stringify(state.data,null,2);
  try{
    var blob=new Blob([text],{type:"application/json"});
    var url=URL.createObjectURL(blob);
    var a=h("a",{href:url,download:"soreki_"+stamp()+".json"});
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(function(){ URL.revokeObjectURL(url); },1500);
    toast("ファイルを書き出しました");
  }catch(e){ toast("保存に失敗。全文表示から手動コピーしてください"); }
}
function handleImport(text, mode){
  var parsed;
  try{ parsed=JSON.parse(text); }
  catch(e){ errorDialog("JSONとして解釈できません",["構文エラー: "+e.message]); return; }
  var v=validateData(parsed);
  if(!v.ok){ errorDialog("読み込みを中止しました",v.errors); return; }
  normalizeData(parsed);
  if(mode==="replace"){
    confirmDialog("全置換の確認","現在のイベント "+state.data.events.length+" 件・伝承 "+state.data.legends.length+" 件は破棄され、読み込んだ内容に置き換わります。",function(){
      state.data=parsed; state.ui.expanded={};
      ["timeline","legend"].forEach(function(kd){ state.ui.filter[kd].tags=[]; });
      buildFilterBar("timeline"); buildFilterBar("legend");
      refresh(); toast("全置換で読み込みました");
    },"置き換える",true);
  }else{
    var res=mergeData(parsed);
    refresh(); toast("統合: 追加 "+res.added+" 件、更新 "+res.updated+" 件");
  }
}
function mergeData(incoming){
  var added=0, updated=0;
  ["tags","events","legends"].forEach(function(key){
    var cur=state.data[key], inc=incoming[key]||[];
    var idx={}; cur.forEach(function(o,i){ idx[o.id]=i; });
    inc.forEach(function(o){
      if(idx[o.id]!=null){ cur[idx[o.id]]=o; updated++; }
      else { cur.push(o); idx[o.id]=cur.length-1; added++; }
    });
  });
  for(var k in incoming){
    if(["app","schemaVersion","meta","tags","events","legends"].indexOf(k)===-1 && !(k in state.data)) state.data[k]=incoming[k];
  }
  return {added:added, updated:updated};
}

function showLayer(id){ $(id).classList.add("on"); }

function closeSheet(){ hideLayer("sheet-layer"); }
function closeDialog(){ hideLayer("dialog-layer"); }
var _toastT=null;
function toast(msg){
  var t=$("toast"); t.textContent=msg; t.classList.add("on");
  if(_toastT) clearTimeout(_toastT);
  _toastT=setTimeout(function(){ t.classList.remove("on"); },2400);
}
function copyText(str, area){
  try{ if(area){ area.focus(); area.select(); } }catch(e){}
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(str).then(function(){ toast("コピーしました"); }).catch(function(){ toast("下の欄を選択してコピーしてください"); });
  }else{
    try{ document.execCommand("copy"); toast("コピーしました"); }catch(e){ toast("下の欄を選択してコピーしてください"); }
  }
}

function switchTab(tab){
  state.ui.tab=tab;
  ["timeline","legend","ledger"].forEach(function(t){ $("panel-"+t).classList.toggle("on",t===tab); });
  document.querySelectorAll(".tabbtn").forEach(function(b){ b.classList.toggle("on",b.dataset.tab===tab); });
  $("fab").style.display = (tab==="ledger") ? "none" : "flex";
  renderCurrent();
  window.scrollTo(0,0);
}

function appbarHeight(){ return $("appbar").offsetHeight; }
/* セーフエリア(--st)はCSSのenv()に任せ、JSはバーの「セーフエリアを除いた高さ」だけを測る。
   = offsetHeight - padding-top(=解決済みのsafe-area-inset-top)。行・枠線・バナーを自動で含み、
   standalone起動時にenv(safe-area-inset-top)の確定が遅れても本文位置がズレない。 */
function setAppbarVar(){
  var ab=$("appbar");
  var padTop=parseFloat(getComputedStyle(ab).paddingTop)||0;
  var h=Math.max(0, ab.offsetHeight - padTop);
  document.documentElement.style.setProperty("--appbar-content-h", h+"px");
}

/* 背景タップで閉じる */
["sheet-layer","dialog-layer"].forEach(function(id){
  $(id).addEventListener("click",function(e){ if(e.target===this) hideLayer(id); });
});
document.querySelectorAll(".tabbtn").forEach(function(b){ b.addEventListener("click",function(){ switchTab(b.dataset.tab); }); });
$("fab").addEventListener("click",function(){ if(state.ui.tab==="legend") openLegendSheet(null); else openEventSheet(null); });
window.addEventListener("resize",setAppbarVar);
window.addEventListener("orientationchange",function(){ setTimeout(setAppbarVar,150); });

/* =====================================================================
   見本データ（保存が空のときだけ最初に置く。書き込むと消える）
   ===================================================================== */
function seedData(){
  var t=1710000000000;
  var d=emptyData();
  d.meta.title="ローゼリア年代記（見本）";
  d.tags=[
    {id:"tag_01",name:"外交",color:"#a63a50"},
    {id:"tag_02",name:"軍事",color:"#4a5e9e"},
    {id:"tag_03",name:"事件",color:"#a8863a"},
    {id:"tag_04",name:"人物",color:"#7d8c4a"},
    {id:"tag_05",name:"条約",color:"#4a7d8c"},
    {id:"tag_06",name:"厄災",color:"#7d4a8c"}
  ];
  function e(o){ o.createdAt=o.createdAt||(t++); o.updatedAt=o.createdAt; if(o.sub==null)o.sub=0; if(!o.tags)o.tags=[]; if(o.end===undefined)o.end=null; if(o.memo==null)o.memo=""; return o; }
  d.events=[
    e({id:genEventId(),title:"第二次反魔戦争",memo:"蒼暦1915年〜1925年。ローゼリア大公国を含む諸国を巻き込んだ大戦。以降の年表はこの戦争を軸に読む。",tags:["tag_02","tag_06"],start:{year:1915,month:null,day:null},end:{year:1925,month:null,day:null}}),
    e({id:genEventId(),title:"開戦布告",memo:"蒼暦1915年3月14日、北方国境での衝突を契機に宣戦。",tags:["tag_02"],start:{year:1915,month:3,day:14}}),
    e({id:genEventId(),title:"北部戦線の崩壊",memo:"年内に前線が後退。詳細な月日は諸記録で食い違う。",tags:["tag_02","tag_03"],start:{year:1917,month:null,day:null}}),
    e({id:genEventId(),title:"ミシェーラ将軍 前線着任",memo:"蒼暦1918年6月、立て直しのため中央から派遣。",tags:["tag_04","tag_02"],start:{year:1918,month:6,day:null}}),
    e({id:genEventId(),title:"北方戦線 膠着",memo:"この年は大きな戦線移動がなく、消耗戦に入る。年精度の記録。",tags:["tag_02"],start:{year:1920,month:null,day:null}}),
    e({id:genEventId(),title:"停戦交渉 開始",memo:"蒼暦1920年1月、第三国の仲介で予備交渉が始まる。",tags:["tag_01"],start:{year:1920,month:1,day:null}}),
    e({id:genEventId(),title:"ローゼリア条約 締結",memo:"特別加盟協定。以降の外交案件はすべてここを参照する。",tags:["tag_01","tag_05"],start:{year:1925,month:null,day:null}}),
    e({id:genEventId(),title:"戦後復興令",memo:"荒廃した北部の再建を定める大公令。",tags:["tag_03"],start:{year:1926,month:null,day:null}}),
    e({id:genEventId(),title:"大公位継承",memo:"長い空白を経て、新大公が即位。",tags:["tag_04"],start:{year:1958,month:null,day:null}}),
    e({id:genEventId(),title:"第三共和政 宣言",memo:"蒼暦1958年11月、統治体制の転換が布告される。",tags:["tag_03"],start:{year:1958,month:11,day:null}})
  ];
  d.legends=[
    {id:genLegendId(),title:"古代文明の崩壊",memo:"伝承のみ。年代の確定は不能。",tags:["tag_06"],approx:"約4000年前",order:0},
    {id:genLegendId(),title:"蒼の顕現",memo:"暦の始点にまつわる伝承。",tags:[],approx:"蒼暦以前",order:1},
    {id:genLegendId(),title:"第一の厄災期",memo:"複数の記録が断片的に伝える災厄の時代。",tags:["tag_06"],approx:"約2000年前",order:2}
  ];
  return d;
}

/* =====================================================================
   起動
   ===================================================================== */
function init(){
  buildFilterBar("timeline");
  buildFilterBar("legend");

  var writable=storageWritable();
  if(writable){
    state.ui.storage="auto";
    var raw=null;
    try{ raw=localStorage.getItem(STORAGE_KEY); }catch(e){ raw=null; }
    if(raw){
      var loaded=null, ok=false;
      try{ loaded=JSON.parse(raw); var v=validateData(loaded); ok=v.ok; }catch(e){ ok=false; }
      if(ok){
        state.data=normalizeData(loaded);
        /* 直前世代として、読み込み成功直後のデータを退避 */
        try{ localStorage.setItem(BACKUP_KEY, raw); }catch(e){}
      }else{
        /* 壊れていたら直前世代を試す */
        var braw=null; try{ braw=localStorage.getItem(BACKUP_KEY); }catch(e){}
        var recovered=false;
        if(braw){ try{ var b=JSON.parse(braw); if(validateData(b).ok){ state.data=normalizeData(b); recovered=true; } }catch(e){} }
        if(recovered){ setTimeout(function(){ toast("保存データが壊れていたため直前世代を読み込みました"); },400); }
        else { state.data=seedData(); setTimeout(function(){ toast("保存データを読めなかったため見本を表示しています"); },400); }
      }
    }else{
      state.data=seedData();      /* 端末での初回。書き出し前に置き換えれば消える */
    }
  }else{
    state.ui.storage="memory";
    $("banner").classList.add("on");
    state.data=seedData();        /* プレビュー等ではメモリ内で見本を動かす */
  }

  setAppbarVar();
  refresh();
  setTimeout(setAppbarVar,60);
}
init();
</script>
